<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RapidReply – Never Miss Another Lead</title>
  <style>
    :root {
      --black: #1d1d1f;
      --dark: #0a0a0f;
      --gray: #6e6e73;
      --light: #f5f5f7;
      --white: #ffffff;
      --blue: #0071e3;
      --blue2: #2997ff;
      --imessage-blue: #1c8cff;
      --purple: #a78bfa;
      --green: #34c759;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      color: var(--black);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: saturate(180%) blur(24px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.07);
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
    }

    .nav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--black);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.85rem;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--black);
    }

    .nav-cta {
      background: var(--blue);
      color: #fff;
      padding: 8px 18px;
      border-radius: 980px;
      font-size: 0.82rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s;
    }

    .nav-cta:hover {
      background: #0077f0;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 24px 60px;
      background: linear-gradient(180deg, var(--light) 0%, var(--white) 100%);
    }

    .hero-eyebrow {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--blue);
      background: rgba(0, 113, 227, 0.08);
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 20px;
    }gap: 8px;
      padding-right: 4px;
    }

    .message {
      display: flex;
      margin-bottom: 2px;
      opacity: 0;
      animation: slideIn 0.4s ease-out forwards;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.received {
      justify-content: flex-start;
    }

    .message.sent {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .message.received .message-bubble {
      background: #e5e5ea;
      color: #000;
      border-radius: 18px 18px 18px 4px;
    }

    .message.sent .message-bubble {
      background: var(--imessage-blue);
      color: #fff;
      border-radius: 18px 18px 4px 18px;
    }

    .message-group {
      margin-bottom: 16px;
    }

    .message-group.alert-box {
      background: #f5f5f7;
      border-radius: 12px;
      padding: 12px;
      margin: 16px auto;
      max-width: 85%;
      text-align: center;
      font-size: 0.85rem;
      color: var(--gray);
    }

    .alert-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--black);
      margin-bottom: 8px;
    }

    .alert-content {
      text-align: left;
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      margin-top: 8px;
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .demo-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
    }

    .btn-demo {
      padding: 12px 24px;
      border-radius: 980px;
      font-size: 0.95rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-demo.primary {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 2px 12px rgba(0, 113, 227, 0.3);
    }

    .btn-demo.primary:hover {
      background: #0077f0;
      transform: translateY(-2px);
    }

    .btn-demo.secondary {
      background: transparent;
      color: var(--gray);
      border: 1px solid rgba(0, 0, 0, 0.15);
    }

    .btn-demo.secondary:hover {
      color: var(--black);
      border-color: rgba(0, 0, 0, 0.3);
    }

    /* STATS */
    .stats-section {
      background: var(--white);
      padding: 80px 24px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      max-width: 900px;
      margin: 0 auto;
      gap: 1px;
      background: #e0e0e5;
      border-radius: 20px;
      overflow: hidden;
    }

    .stat-box {
      background: var(--light);
      padding: 48px 32px;
      text-align: center;
    }

    .stat-num {
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 700;
      letter-spacing: -0.05em;
      color: var(--black);
      line-height: 1;
    }

    .stat-num span {
      color: var(--blue);
    }

    .stat-desc {
      margin-top: 10px;
      font-size: 0.85rem;
      color: var(--gray);
      line-height: 1.55;
      max-width: 220px;
      margin-left: auto;
      margin-right: auto;
    }sR�RBSRSR�&v&�C�S�#SR����R�G&�7&V�BsR������FW"�WfV�G3����S��Р��7F�6V7F����"��f��B�6��S�6���'&V��B�Wgr�2�W&Vғ��f��B�vV�v�C�s���WGFW"�76��s���FVӰ�6���#�6ffc���&v���&�GF�Ӣg���Ɩ�RֆV�v�C�����6�F���&V�F�fS��Р��7F�6V7F������f��B�6��S��&VӰ�6���#�&v&�#SR�#SR�#SR��R������v�GF��CC����&v��WF�3����Ɩ�RֆV�v�C��cS���6�F���&V�F�fS��Р��7F�f�&������v�GF��C�����&v��WF��6�F���&V�F�fS��&6�w&�V�C�&v&�#SR�#SR�#SR��r���&�&FW#��6�ƖB&v&�#SR�#SR�#SR��"���&�&FW"�&F�W3�#���FF��s�3'�#����FW�B�Ɩv��VgC��Р���d��DU"��f��FW"��&6�w&�V�C�f"���Ɩv�B���FF��s�C��#G�3'���FW�B�Ɩv�6V�FW#��Р��f��B���v���f��B�6��S��&VӰ�f��B�vV�v�C�s��6���#�f"���&�6�����&v���&�GF�Ӣg���Р��f��B�Ɩ�2��F�7���f�W���v�#����W7F�g��6��FV�C�6V�FW#��f�W��w&�w&���&v���&�GF�Ӣ#���Р��f��B�Ɩ�2��f��B�6��S��'&VӰ�6���#�f"���w&����FW�B�FV6�&F������S��Р��f��B�Ɩ�2���fW"��6���#�f"���&�6����Р�f��FW"��f��B�6��S��s�&VӰ�6���#�f"���w&�����&v���&�GF�Ӣ����Р��f��B�6��F7B��F�7���f�W���v�g����W7F�g��6��FV�C�6V�FW#��Р��f��B�6��F7B��f��B�6��S��'&VӰ�6���#�f"���&�VR���FW�B�FV6�&F������S��Р��$U5��4�dR���VF�����v�GF��sc������b��FF��s�#���Р���b�Ɩ�2��F�7������S��Р��W&����f��B�6��S�"�G&VӰ�Р��W&��7V"��f��B�6��S�&VӰ�Р���F���7FW2��w&�B�FV��FR�6��V��3�g#��Р��7FG2�w&�B��w&�B�FV��FR�6��V��3�g#��Р��fVB
